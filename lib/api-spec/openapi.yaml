openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WanisAI API - consent-first cognitive health companion
servers:
  - url: /api
    description: Base API path
tags:
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: health
    description: Health operations
  - name: profile
    description: User profile and consent
  - name: family
    description: Family members
  - name: routines
    description: Daily routines
  - name: checkins
    description: Weekly check-ins and AI analysis
  - name: guardian
    description: Guardian mode - Hajj/Umrah safety
  - name: memory
    description: Memory companion - photo lookup
  - name: gemini
    description: Gemini AI chat operations
paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
        '500':
          description: Failed to generate upload URL.
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
        '404':
          description: File not found.
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
        '404':
          description: Object not found.
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: upsertProfile
      tags: [profile]
      summary: Create or update user profile (includes consent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /family-members:
    get:
      operationId: listFamilyMembers
      tags: [family]
      summary: List all family members
      responses:
        "200":
          description: Family members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMember"
    post:
      operationId: createFamilyMember
      tags: [family]
      summary: Add a family member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyMemberInput"
      responses:
        "201":
          description: Created family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"

  /family-members/summary:
    get:
      operationId: getFamilyMembersSummary
      tags: [family]
      summary: Get summary of family network
      responses:
        "200":
          description: Family summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilySummary"

  /family-members/{id}:
    get:
      operationId: getFamilyMember
      tags: [family]
      summary: Get a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateFamilyMember
      tags: [family]
      summary: Update a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyMemberUpdate"
      responses:
        "200":
          description: Updated family member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteFamilyMember
      tags: [family]
      summary: Remove a family member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /medications:
    get:
      operationId: listMedications
      tags: [medications]
      summary: List all medications
      responses:
        "200":
          description: List of medications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medication"
    post:
      operationId: addMedication
      tags: [medications]
      summary: Add a medication manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationInput"
      responses:
        "201":
          description: Created medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"

  /medications/{id}:
    delete:
      operationId: deleteMedication
      tags: [medications]
      summary: Remove a medication
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medication"
        "404":
          description: Not found

  /medications/extract-vision:
    post:
      operationId: extractMedicationVision
      tags: [medications]
      summary: Extract medication details from an uploaded image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicationVisionExtractRequest"
      responses:
        "200":
          description: Extracted medication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationVisionExtractResponse"

  /medications/analyze:
    post:
      operationId: analyzeMedications
      tags: [medications]
      summary: Analyze current medications for ACB burden
      responses:
        "200":
          description: AI generated explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MedicationAnalyzeResponse"

  /doctor-briefs:
    post:
      operationId: generateDoctorBrief
      tags: [doctor-briefs]
      summary: Generate a new Doctor Brief document
      responses:
        "201":
          description: Brief generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorBrief"

  /doctor-briefs/share/{key}:
    get:
      operationId: getSharedDoctorBrief
      tags: [doctor-briefs]
      summary: Get a shared Doctor Brief by its secure key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shared Doctor Brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorBrief"
        "404":
          description: Brief not found

  /routines:
    get:
      operationId: listRoutines
      tags: [routines]
      summary: List daily routines
      responses:
        "200":
          description: Routines list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Routine"
    post:
      operationId: createRoutine
      tags: [routines]
      summary: Create a routine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineInput"
      responses:
        "201":
          description: Created routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"

  /routines/{id}:
    patch:
      operationId: updateRoutine
      tags: [routines]
      summary: Update a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutineUpdate"
      responses:
        "200":
          description: Updated routine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Routine"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteRoutine
      tags: [routines]
      summary: Delete a routine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /check-ins:
    get:
      operationId: listCheckIns
      tags: [checkins]
      summary: List all weekly check-ins
      responses:
        "200":
          description: Check-ins list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CheckIn"
    post:
      operationId: createCheckIn
      tags: [checkins]
      summary: Start a new weekly check-in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInInput"
      responses:
        "201":
          description: Created check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"

  /check-ins/dashboard:
    get:
      operationId: getCheckInDashboard
      tags: [checkins]
      summary: Get check-in trends and baseline comparison
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInDashboard"

  /check-ins/family-letter:
    get:
      operationId: getLatestFamilyLetter
      tags: [checkins]
      summary: Get the most recently generated family letter
      responses:
        "200":
          description: Latest family letter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyLetterResponse"

    post:
      operationId: generateFamilyLetter
      tags: [checkins]
      summary: Generate a weekly letter to the family using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FamilyLetterInput"
      responses:
        "200":
          description: Generated family letter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyLetterResponse"

  /check-ins/{id}:
    get:
      operationId: getCheckIn
      tags: [checkins]
      summary: Get a specific check-in
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Check-in detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /check-ins/{id}/analyze:
    post:
      operationId: analyzeCheckIn
      tags: [checkins]
      summary: Analyze a check-in with Claude AI (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of analysis
          content:
            text/event-stream: {}
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /check-ins/{id}/action-complete:
    patch:
      operationId: markActionComplete
      tags: [checkins]
      summary: Mark suggested action as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionCompleteInput"
      responses:
        "200":
          description: Updated check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /guardian-profile:
    get:
      operationId: getGuardianProfile
      tags: [guardian]
      summary: Get guardian/pilgrim safety profile
      responses:
        "200":
          description: Guardian profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      operationId: upsertGuardianProfile
      tags: [guardian]
      summary: Create or update guardian profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuardianProfileInput"
      responses:
        "200":
          description: Updated guardian profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuardianProfile"

  /memory-photos:
    get:
      operationId: listMemoryPhotos
      tags: [memory]
      summary: List all memory companion photos
      responses:
        "200":
          description: Memory photos list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryPhoto"
    post:
      operationId: createMemoryPhoto
      tags: [memory]
      summary: Add a memory photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryPhotoInput"
      responses:
        "201":
          description: Created memory photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryPhoto"

  /memory-photos/{id}:
    delete:
      operationId: deleteMemoryPhoto
      tags: [memory]
      summary: Delete a memory photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /together-audio:
    get:
      operationId: listTogetherAudio
      tags: [together]
      summary: List all together audio clips
      responses:
        "200":
          description: Together audio list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TogetherAudio"
    post:
      operationId: createTogetherAudio
      tags: [together]
      summary: Add a together audio clip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TogetherAudioInput"
      responses:
        "201":
          description: Created together audio clip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TogetherAudio"

  /together-audio/{id}:
    delete:
      operationId: deleteTogetherAudio
      tags: [together]
      summary: Delete a together audio clip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

  /life-story:
    get:
      operationId: listLifeStoryEntries
      tags: [lifestory]
      summary: Get all life story entries
      responses:
        "200":
          description: List of life story entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeStoryEntry"

  /life-story/entry:
    post:
      operationId: createLifeStoryEntry
      tags: [lifestory]
      summary: Add a new life story entry manually or via hook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeStoryEntryInput"
      responses:
        "201":
          description: Created life story entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeStoryEntry"


components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        dateOfBirth:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        consentGiven:
          type: boolean
        consentNotes:
          type: ["string", "null"]
        guardianModeEnabled:
          type: boolean
        experienceMode:
          type: string
          enum: [personal, family]
        reminiscenceMode:
          type: ["string", "null"]
          enum: [music, nasheed, voice, "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - consentGiven
        - guardianModeEnabled
        - experienceMode
        - createdAt
        - updatedAt

    UserProfileInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
        photoUrl:
          type: string
        consentGiven:
          type: boolean
        consentNotes:
          type: string
        guardianModeEnabled:
          type: boolean
        experienceMode:
          type: string
          enum: [personal, family]
        reminiscenceMode:
          type: string
          enum: [music, nasheed, voice]
      required:
        - name
        - consentGiven

    FamilyMember:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        relationship:
          type: string
        photoUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isEmergencyContact:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - relationship
        - isEmergencyContact
        - createdAt

    FamilyMemberInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        relationship:
          type: string
          minLength: 1
        photoUrl:
          type: string
        phone:
          type: string
        isEmergencyContact:
          type: boolean
      required:
        - name
        - relationship

    FamilyMemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        relationship:
          type: string
        photoUrl:
          type: string
        phone:
          type: string
        isEmergencyContact:
          type: boolean

    FamilySummary:
      type: object
      properties:
        totalMembers:
          type: integer
        emergencyContacts:
          type: integer
        hasPhotos:
          type: integer
      required:
        - totalMembers
        - emergencyContacts
        - hasPhotos

    Routine:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        time:
          type: ["string", "null"]
        frequency:
          type: string
        appointmentDate:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - frequency
        - createdAt

    RoutineInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        time:
          type: string
        frequency:
          type: string
        appointmentDate:
          type: string
      required:
        - name
        - frequency

    RoutineUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        time:
          type: string
        frequency:
          type: string

    CheckIn:
      type: object
      properties:
        id:
          type: integer
        weekOf:
          type: string
        prompt:
          type: string
        response:
          type: ["string", "null"]
        mood:
          type: ["string", "null"]
        socialEngagement:
          type: ["string", "null"]
        analysisResult:
          type: ["string", "null"]
        actionSuggested:
          type: ["string", "null"]
        actionCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - weekOf
        - prompt
        - actionCompleted
        - createdAt

    CheckInInput:
      type: object
      properties:
        weekOf:
          type: string
        prompt:
          type: string
          minLength: 1
        response:
          type: string
      required:
        - weekOf
        - prompt

    ActionCompleteInput:
      type: object
      properties:
        actionCompleted:
          type: boolean
      required:
        - actionCompleted

    CheckInDashboard:
      type: object
      properties:
        totalCheckIns:
